###########
# Backend #
###########

backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
vsync = true;
xrender-sync-fence = "true";
glx-swap-method = -1;

###########
# Opacity #
###########

inactive-opacity = 0.8;
active-opacity = 0.9;
frame-opacity = 0.8;
inactive-opacity-override = false;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "window_type = 'browser'"
];
blur-kern = "3x3box";
blur-method = "dual_kawase";
blur-strength = 8;
# opacity-rule = [
#   # "90:class_g = 'Alacritty'"
#   "100:name *= 'Firefox'"
# ];

##########
# Fading #
##########
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
